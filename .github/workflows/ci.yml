name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    name: Build & test (macOS)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Show toolchain
        run: swift --version
      # Resolves ReticulumSwift from its published GitHub release.
      - name: Build
        run: swift build
      - name: Test
        run: swift test
